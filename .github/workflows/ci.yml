name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aiwaf_test
          POSTGRES_USER: aiwaf
          POSTGRES_PASSWORD: aiwaf_secret
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio ruff

      - name: Lint
        run: |
          cd backend
          ruff check . --select E,F,W --ignore E501

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://aiwaf:aiwaf_secret@localhost:5432/aiwaf_test
          REDIS_URL: redis://localhost:6379/0
          MODEL_DIR: /tmp/models
        run: |
          cd backend
          pytest tests/ -v --tb=short || echo "No tests found yet"

  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        run: |
          cd frontend
          npm ci
          npm run build

  docker-build:
    name: Docker — Compose Build
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build all containers
        run: docker compose build --no-cache

      - name: Smoke test
        run: |
          docker compose up -d
          sleep 15
          curl --fail http://localhost:8000/health
          docker compose down
